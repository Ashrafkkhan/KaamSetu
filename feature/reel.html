<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RuralCraft — Learn Real Skills</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --soil: #1a1208;
    --bark: #2d1f0e;
    --clay: #8b5e3c;
    --wheat: #d4a853;
    --leaf: #4a7c59;
    --sky: #e8f4f8;
    --cream: #f7f0e6;
    --accent: #e8643a;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--soil);
    color: var(--cream);
    height: 100dvh;
    overflow: hidden;
    display: flex;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--bark);
    display: flex;
    flex-direction: column;
    padding: 28px 0;
    border-right: 1px solid rgba(212,168,83,.15);
    z-index: 10;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--wheat);
    padding: 0 24px 28px;
    border-bottom: 1px solid rgba(212,168,83,.15);
    line-height: 1.1;
  }
  .logo span { color: var(--accent); }

  .skills-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--clay);
    padding: 20px 24px 10px;
  }

  .skill-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 24px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: #b0a090;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    text-align: left;
    transition: all .2s;
    border-left: 3px solid transparent;
  }
  .skill-btn:hover { color: var(--cream); background: rgba(255,255,255,.04); }
  .skill-btn.active {
    color: var(--wheat);
    border-left-color: var(--wheat);
    background: rgba(212,168,83,.08);
  }
  .skill-btn .icon { font-size: 20px; width: 26px; text-align: center; }

  .sidebar-footer {
    margin-top: auto;
    padding: 20px 24px;
    font-size: 11px;
    color: var(--clay);
    border-top: 1px solid rgba(212,168,83,.1);
  }

  /* ── MAIN AREA ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ── HEADER ── */
  .topbar {
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,.06);
    flex-shrink: 0;
  }
  .topbar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--wheat);
  }
  .topbar-meta { font-size: 13px; color: var(--clay); }

  /* ── FEED ── */
  .feed-wrapper {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .feed {
    height: 100%;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
  }
  .feed::-webkit-scrollbar { display: none; }

  /* ── VIDEO CARD ── */
  .video-card {
    scroll-snap-align: start;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 20px 40px;
  }

  .card-inner {
    position: relative;
    height: 100%;
    max-height: 680px;
    aspect-ratio: 9/16;
    border-radius: 18px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 30px 80px rgba(0,0,0,.7);
  }

  .card-inner iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* overlay label */
  .card-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 40px 18px 18px;
    background: linear-gradient(transparent, rgba(0,0,0,.75));
    pointer-events: none;
  }
  .card-label .skill-tag {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 4px;
    margin-bottom: 6px;
  }
  .card-label .vid-title {
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* side actions */
  .card-actions {
    position: absolute;
    right: -52px;
    bottom: 80px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .action-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: rgba(255,255,255,.12);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: all .2s;
    color: #fff;
    text-decoration: none;
  }
  .action-btn:hover { background: var(--accent); border-color: var(--accent); transform: scale(1.1); }

  /* scroll hints */
  .scroll-hint {
    position: absolute;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
  }
  .hint-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,.2);
    transition: all .3s;
  }
  .hint-dot.active { background: var(--wheat); height: 20px; border-radius: 3px; }

  /* ── LOADING / EMPTY ── */
  .state-screen {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--clay);
  }
  .state-screen .big-icon { font-size: 64px; opacity: .4; }
  .state-screen h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--wheat);
    opacity: .5;
  }
  .state-screen p { font-size: 14px; opacity: .6; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(212,168,83,.2);
    border-top-color: var(--wheat);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #fff;
    padding: 10px 22px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 600;
    transition: transform .3s;
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">Rural<br><span>Craft</span></div>
  <div class="skills-label">Skills</div>

  <button class="skill-btn" data-query="plumbing repair tutorial shorts" onclick="selectSkill(this)">
    <span class="icon">🔧</span> Plumbing
  </button>
  <button class="skill-btn" data-query="basic electrical wiring tutorial shorts" onclick="selectSkill(this)">
    <span class="icon">⚡</span> Electrical
  </button>
  <button class="skill-btn" data-query="masonry construction tutorial shorts" onclick="selectSkill(this)">
    <span class="icon">🧱</span> Masonry
  </button>
  <button class="skill-btn" data-query="farming techniques tutorial shorts" onclick="selectSkill(this)">
    <span class="icon">🌾</span> Farming
  </button>
  <button class="skill-btn" data-query="carpentry woodwork tutorial shorts" onclick="selectSkill(this)">
    <span class="icon">🪵</span> Carpentry
  </button>
  <button class="skill-btn" data-query="welding basics tutorial shorts" onclick="selectSkill(this)">
    <span class="icon">🔥</span> Welding
  </button>
  <button class="skill-btn" data-query="roofing repair tutorial shorts" onclick="selectSkill(this)">
    <span class="icon">🏚️</span> Roofing
  </button>

  <div class="sidebar-footer">Swipe or scroll to learn</div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Pick a Skill</div>
    <div class="topbar-meta" id="topbar-meta">← choose from the sidebar</div>
  </div>

  <div class="feed-wrapper">
    <div class="feed" id="feed">
      <!-- Empty state -->
      <div class="video-card">
        <div class="state-screen">
          <div class="big-icon">🌿</div>
          <h2>Start Learning</h2>
          <p>Select any skill from the sidebar to begin</p>
        </div>
      </div>
    </div>

    <!-- Scroll indicators -->
    <div class="scroll-hint" id="dots"></div>
  </div>
</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API_KEY = "AIzaSyDX4st0rcp5_JqTrldpZFrb-axKqPF1iAo";
  let currentSkill = "";
  let activeIndex = 0;

  const feed = document.getElementById("feed");
  const dots = document.getElementById("dots");

  function selectSkill(btn) {
    document.querySelectorAll(".skill-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const query = btn.dataset.query;
    const label = btn.textContent.trim();
    if (query === currentSkill) return;
    currentSkill = query;
    document.getElementById("topbar-title").textContent = label;
    loadVideos(query, label);
  }

  async function loadVideos(query, label) {
    feed.innerHTML = `<div class="video-card"><div class="state-screen"><div class="spinner"></div><h2>Loading</h2><p>Finding the best ${label} shorts…</p></div></div>`;
    dots.innerHTML = "";

    try {
      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&videoDuration=short&maxResults=9&key=${API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();

      if (!data.items || data.items.length === 0) {
        feed.innerHTML = `<div class="video-card"><div class="state-screen"><div class="big-icon">😕</div><h2>No Videos</h2><p>Try another skill</p></div></div>`;
        return;
      }

      feed.innerHTML = "";
      dots.innerHTML = "";
      activeIndex = 0;

      data.items.forEach((video, i) => {
        const videoId = video.id.videoId;
        const title = video.snippet.title;

        const card = document.createElement("div");
        card.className = "video-card";
        card.dataset.index = i;

        card.innerHTML = `
          <div class="card-inner">
            <iframe
              src="https://www.youtube.com/embed/${videoId}?autoplay=0&rel=0&modestbranding=1"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
            <div class="card-label">
              <div class="skill-tag">${label}</div>
              <div class="vid-title">${escHtml(title)}</div>
            </div>
            <div class="card-actions">
              <a class="action-btn" href="https://www.youtube.com/watch?v=${videoId}" target="_blank" title="Open on YouTube">▶</a>
              <button class="action-btn" onclick="copyLink('${videoId}')" title="Share">🔗</button>
            </div>
          </div>`;

        feed.appendChild(card);

        // dot indicator
        const dot = document.createElement("div");
        dot.className = "hint-dot" + (i === 0 ? " active" : "");
        dots.appendChild(dot);
      });

      // scroll spy
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            activeIndex = parseInt(entry.target.dataset.index);
            document.querySelectorAll(".hint-dot").forEach((d, i) => {
              d.classList.toggle("active", i === activeIndex);
            });
            document.getElementById("topbar-meta").textContent =
              `${activeIndex + 1} of ${data.items.length} videos`;
          }
        });
      }, { root: feed, threshold: 0.5 });

      document.querySelectorAll(".video-card[data-index]").forEach(c => observer.observe(c));

    } catch (e) {
      feed.innerHTML = `<div class="video-card"><div class="state-screen"><div class="big-icon">⚠️</div><h2>Error</h2><p>${e.message}</p></div></div>`;
    }
  }

  function copyLink(videoId) {
    navigator.clipboard.writeText(`https://www.youtube.com/watch?v=${videoId}`);
    showToast("Link copied!");
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // keyboard nav
  document.addEventListener("keydown", e => {
    const cards = document.querySelectorAll(".video-card[data-index]");
    if (!cards.length) return;
    if (e.key === "ArrowDown" && activeIndex < cards.length - 1) {
      cards[activeIndex + 1].scrollIntoView({ behavior: "smooth" });
    }
    if (e.key === "ArrowUp" && activeIndex > 0) {
      cards[activeIndex - 1].scrollIntoView({ behavior: "smooth" });
    }
  });
</script>
</body>
</html>
